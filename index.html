<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中海油 (00883.HK) 终极动态仪表盘 V3</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --green: #4caf50;
            --yellow: #ffeb3b;
            --red: #f44336;
            --accent: #00bcd4;
            --border-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 1000px; width: 100%; }
        header {
            text-align: center; margin-bottom: 20px;
            border-bottom: 2px solid var(--accent); padding-bottom: 10px;
        }
        .version-badge {
            background-color: var(--accent);
            color: #000;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.5em;
            vertical-align: middle;
            margin-left: 10px;
        }
        
        .section-title {
            color: var(--accent); font-size: 1.1rem;
            margin: 20px 0 10px 0; display: flex; align-items: center;
        }
        
        .controls-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; background-color: #252525; padding: 20px;
            border-radius: 12px; margin-bottom: 10px;
        }
        .controls-grid.market { border-left: 5px solid var(--accent); }
        .controls-grid.finance { border-left: 5px solid #ff9800; background-color: #2a2218; }
        
        .control-group { display: flex; flex-direction: column; }
        .control-group label { font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
        .control-group input[type="number"] {
            background-color: #121212; border: 1px solid var(--border-color);
            color: #fff; padding: 8px; border-radius: 4px; font-size: 1.1rem; margin-bottom: 5px;
            transition: border-color 0.3s;
        }
        .control-group input[type="number"]:focus { border-color: var(--accent); outline: none; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        
        .metrics-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin: 20px 0;
        }
        .card {
            background-color: var(--card-bg); padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center;
            border-top: 4px solid var(--border-color); transition: all 0.3s;
        }
        .card.highlight { border-top-color: var(--accent); }
        .card h3 { margin: 0 0 10px 0; color: #bbb; font-size: 1rem; font-weight: normal; }
        .metric { font-size: 2rem; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .metric-sub { font-size: 0.9rem; color: #888; }

        .status-box {
            background-color: #252525; padding: 20px; border-radius: 12px;
            display: flex; align-items: center; margin-bottom: 20px;
        }
        .light {
            width: 20px; height: 20px; border-radius: 50%;
            margin-right: 15px; box-shadow: 0 0 10px currentColor; transition: all 0.3s;
        }

        .table-container { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid var(--border-color); }
        th { background-color: #2a2a2a; color: var(--accent); font-size: 0.95rem; }
        .current-row { background-color: rgba(0, 188, 212, 0.1); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎯 00883.HK 终极决策仪表盘 <span class="version-badge">V3 修复版</span></h1>
    </header>

    <div class="section-title">📊 市场环境模拟 (日常盯盘拖动滑块)</div>
    <div class="controls-grid market">
        <div class="control-group">
            <label>🛢️ 模拟国际油价 ($)</label>
            <input type="number" id="in_oil" value="70.00" step="1" oninput="calculate()">
            <input type="range" id="slide_oil" min="40" max="120" value="70" step="1" oninput="sync('slide_oil', 'in_oil')">
        </div>
        <div class="control-group">
            <label>📉 当前市价 (HK$)</label>
            <input type="number" id="in_price" value="26.30" step="0.1" oninput="calculate()">
            <input type="range" id="slide_price" min="15" max="40" value="26.3" step="0.1" oninput="sync('slide_price', 'in_price')">
        </div>
        <div class="control-group">
            <label>🛠️ 模拟当前桶油成本 ($)</label>
            <input type="number" id="in_sim_barrel" value="27.35" step="0.1" oninput="calculate()">
            <input type="range" id="slide_barrel" min="20" max="40" value="27.35" step="0.1" oninput="sync('slide_barrel', 'in_sim_barrel')">
        </div>
        <div class="control-group">
            <label>💰 你的持仓均价 (HK$)</label>
            <input type="number" id="in_cost" value="27.00" step="0.1" oninput="calculate()">
        </div>
        <div class="control-group">
            <label>🎯 目标底线股息率 (%)</label>
            <input type="number" id="in_target" value="5.5" step="0.1" oninput="calculate()">
        </div>
    </div>

    <div class="section-title">🏢 财报基准底层数据 (出新财报后在此更新)</div>
    <div class="controls-grid finance">
        <div class="control-group">
            <label>📑 年化净利基准 (亿)</label>
            <input type="number" id="in_base_profit" value="1360" step="10" oninput="calculate()">
        </div>
        <div class="control-group">
            <label>🛢️ 基准利润对应油价 ($)</label>
            <input type="number" id="in_base_oil" value="68.00" step="0.1" oninput="calculate()">
        </div>
        <div class="control-group">
            <label>🛠️ 财报基准桶油成本 ($)</label>
            <input type="number" id="in_base_barrel" value="27.35" step="0.01" oninput="syncBaseCost()">
        </div>
        <div class="control-group">
            <label>🤝 承诺派息率 (%)</label>
            <input type="number" id="in_payout" value="45.5" step="0.1" oninput="calculate()">
        </div>
        <div class="control-group">
            <label>💱 汇率 (HKD/RMB)</label>
            <input type="number" id="in_exchange" value="0.88" step="0.01" oninput="calculate()">
        </div>
    </div>

    <div class="metrics-grid">
        <div class="card highlight">
            <h3>预估全年每股分红</h3>
            <div class="metric" id="out_div">HK$ 0.00</div>
            <div class="metric-sub" id="out_profit">预估利润: 0 亿元</div>
        </div>
        <div class="card" id="card_safe">
            <h3>安全买入价 (满足目标股息)</h3>
            <div class="metric" id="out_safe">HK$ 0.00</div>
            <div class="metric-sub">跌破此价即为击球区</div>
        </div>
        <div class="card">
            <h3>当前市价股息率</h3>
            <div class="metric" id="out_current_yield" style="color: var(--accent);">0.0%</div>
            <div class="metric-sub">按模拟市价计算</div>
        </div>
        <div class="card">
            <h3>你的持仓股息率</h3>
            <div class="metric" id="out_my_yield">0.0%</div>
            <div class="metric-sub">按持仓成本计算</div>
        </div>
    </div>

    <div class="status-box" id="action_box">
        <div class="light" id="status_light"></div>
        <div>
            <h2 style="margin: 0 0 5px 0;" id="action_title">计算中...</h2>
            <p style="margin: 0; color: #aaa;" id="action_desc">请调整参数</p>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>模拟国际油价</th>
                    <th>预估利润 (亿元)</th>
                    <th>每股分红 (HK$)</th>
                    <th>安全股价 (HK$)</th>
                    <th>当前市价股息率</th>
                </tr>
            </thead>
            <tbody id="table_body">
            </tbody>
        </table>
    </div>
</div>

<script>
    const TOTAL_SHARES = 476; // 总股本约 476 亿股
    const PROFIT_MULTIPLIER = 20; // 净利差每变动1美元，全年利润变动约 20 亿元人民币
    const TAX_MULTIPLIER = 1.05; // 税费放大系数

    // 同步底部基准成本到顶部的模拟成本，防止改了底部没反应
    function syncBaseCost() {
        let baseCost = document.getElementById('in_base_barrel').value;
        document.getElementById('in_sim_barrel').value = baseCost;
        document.getElementById('slide_barrel').value = baseCost;
        calculate();
    }

    // 核心计算逻辑：基于基准数据的差值推算 (包含油价变动与成本变动)
    function getFinancials(simOil, simBarrel) {
        let baseProfit = parseFloat(document.getElementById('in_base_profit').value);
        let baseOil = parseFloat(document.getElementById('in_base_oil').value);
        let baseBarrel = parseFloat(document.getElementById('in_base_barrel').value);
        let payoutRatio = parseFloat(document.getElementById('in_payout').value) / 100;
        let exchangeRate = parseFloat(document.getElementById('in_exchange').value);

        // 有效净利差 = (当前油价 - 基准油价) - (当前成本 - 基准成本) * 税费系数
        let effectiveMargin = (simOil - baseOil) - ((simBarrel - baseBarrel) * TAX_MULTIPLIER); 
        
        let profit = baseProfit + (effectiveMargin * PROFIT_MULTIPLIER);
        if(profit < 0) profit = 0; 
        
        let eps = profit / TOTAL_SHARES; 
        let div = (eps * payoutRatio) / exchangeRate; 
        return { profit: profit, div: div };
    }

    function sync(sourceId, targetId) {
        document.getElementById(targetId).value = document.getElementById(sourceId).value;
        calculate();
    }

    function calculate() {
        let simOil = parseFloat(document.getElementById('in_oil').value);
        let simBarrel = parseFloat(document.getElementById('in_sim_barrel').value);
        let price = parseFloat(document.getElementById('in_price').value);
        let cost = parseFloat(document.getElementById('in_cost').value);
        let targetYield = parseFloat(document.getElementById('in_target').value) / 100;

        let currentFin = getFinancials(simOil, simBarrel);
        let safePrice = currentFin.div / targetYield;
        let currentYield = currentFin.div / price;
        let myYield = currentFin.div / cost;

        // 更新UI
        document.getElementById('out_div').innerText = "HK$ " + currentFin.div.toFixed(2);
        document.getElementById('out_profit').innerText = "预估利润: " + Math.round(currentFin.profit) + " 亿元";
        document.getElementById('out_safe').innerText = "HK$ " + safePrice.toFixed(2);
        document.getElementById('out_current_yield').innerText = (currentYield * 100).toFixed(1) + "%";
        document.getElementById('out_my_yield').innerText = (myYield * 100).toFixed(1) + "%";

        // 红绿灯逻辑
        let light = document.getElementById('status_light');
        let title = document.getElementById('action_title');
        let desc = document.getElementById('action_desc');
        let cardSafe = document.getElementById('card_safe');

        if (price <= safePrice * 0.95) {
            light.style.backgroundColor = "var(--green)"; light.style.color = "var(--green)";
            title.innerText = "🟢 绿灯区：安全垫极厚，放心买入";
            desc.innerText = `当前市价低于安全价，实际股息率高达 ${(currentYield*100).toFixed(1)}%。`;
            cardSafe.style.borderTopColor = "var(--green)";
        } else if (price <= safePrice * 1.05) {
            light.style.backgroundColor = "var(--yellow)"; light.style.color = "var(--yellow)";
            title.innerText = "🟡 黄灯区：观望或小额定投";
            desc.innerText = `股息率在目标 ${targetYield*100}% 附近，停止大额追高。`;
            cardSafe.style.borderTopColor = "var(--yellow)";
        } else {
            light.style.backgroundColor = "var(--red)"; light.style.color = "var(--red)";
            title.innerText = "🔴 红灯区：严重透支，考虑止盈换仓";
            desc.innerText = `价格已透支基本面，股息率跌至 ${(currentYield*100).toFixed(1)}%。考虑卖出。`;
            cardSafe.style.borderTopColor = "var(--red)";
        }

        // 表格更新
        let tableOilPrices = [50, 60, simOil, 80, 90];
        tableOilPrices = [...new Set(tableOilPrices)].sort((a,b) => a-b);
        let tbody = document.getElementById('table_body');
        tbody.innerHTML = "";
        
        tableOilPrices.forEach(o => {
            let fin = getFinancials(o, simBarrel);
            let sPrice = fin.div / targetYield;
            let cYield = fin.div / price;
            
            let tr = document.createElement('tr');
            if (o === simOil) tr.className = "current-row";
            tr.innerHTML = `
                <td>$${o.toFixed(2)}</td>
                <td>${Math.round(fin.profit)}</td>
                <td>${fin.div.toFixed(2)}</td>
                <td>${sPrice.toFixed(2)}</td>
                <td style="color: ${cYield >= targetYield ? 'var(--green)' : 'var(--red)'}">${(cYield*100).toFixed(1)}%</td>
            `;
            tbody.appendChild(tr);
        });
    }

    window.onload = calculate;
</script>

</body>
</html>

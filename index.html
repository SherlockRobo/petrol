<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中海油 (00883.HK) 动态决策仪表盘</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --green: #4caf50;
            --yellow: #ffeb3b;
            --red: #f44336;
            --accent: #00bcd4;
            --border-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }
        /* 控制面板样式 */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background-color: #252525;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
        }
        .control-group input[type="number"] {
            background-color: #121212;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .control-group input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        
        /* 数据卡片样式 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
            border-top: 4px solid var(--border-color);
        }
        .card.highlight { border-top-color: var(--accent); }
        .card h3 {
            margin: 0 0 10px 0;
            color: #bbb;
            font-size: 1rem;
            font-weight: normal;
        }
        .metric {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        .metric-sub {
            font-size: 0.9rem;
            color: #888;
        }

        /* 表格样式 */
        .table-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        th { background-color: #2a2a2a; color: var(--accent); }
        .current-row { background-color: rgba(0, 188, 212, 0.1); font-weight: bold; }
        
        /* 状态指示灯 */
        .status-box {
            background-color: #252525;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
        }
        .light {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 15px;
            box-shadow: 0 0 10px currentColor;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎯 00883.HK 动态决策仪表盘</h1>
    </header>

    <div class="controls-grid">
        <div class="control-group">
            <label>🛢️ 国际油价 (美元/桶)</label>
            <input type="number" id="in_oil" value="68.00" step="1" oninput="calculate()">
            <input type="range" id="slide_oil" min="40" max="120" value="68" step="1" oninput="sync('slide_oil', 'in_oil')">
        </div>
        <div class="control-group">
            <label>📉 当前股价 (港元)</label>
            <input type="number" id="in_price" value="26.30" step="0.1" oninput="calculate()">
            <input type="range" id="slide_price" min="15" max="40" value="26.3" step="0.1" oninput="sync('slide_price', 'in_price')">
        </div>
        <div class="control-group">
            <label>💰 你的持仓成本 (港元)</label>
            <input type="number" id="in_cost" value="27.00" step="0.1" oninput="calculate()">
            <input type="range" id="slide_cost" min="15" max="40" value="27.0" step="0.1" oninput="sync('slide_cost', 'in_cost')">
        </div>
        <div class="control-group">
            <label>🛠️ 桶油成本 (美元/桶)</label>
            <input type="number" id="in_barrel" value="27.35" step="0.01" oninput="calculate()">
        </div>
        <div class="control-group">
            <label>🎯 目标股息率 (%)</label>
            <input type="number" id="in_target" value="5.0" step="0.1" oninput="calculate()">
        </div>
    </div>

    <div class="metrics-grid">
        <div class="card highlight">
            <h3>预估全年每股分红</h3>
            <div class="metric" id="out_div">HK$ 0.00</div>
            <div class="metric-sub" id="out_profit">预估利润: 0 亿元</div>
        </div>
        <div class="card" id="card_safe">
            <h3>安全买入价 (满足目标股息)</h3>
            <div class="metric" id="out_safe">HK$ 0.00</div>
            <div class="metric-sub">跌破此价即为击球区</div>
        </div>
        <div class="card">
            <h3>当前市价股息率</h3>
            <div class="metric" id="out_current_yield" style="color: var(--accent);">0.0%</div>
            <div class="metric-sub">按最新股价计算</div>
        </div>
        <div class="card">
            <h3>你的持仓股息率</h3>
            <div class="metric" id="out_my_yield">0.0%</div>
            <div class="metric-sub">按持仓成本计算</div>
        </div>
    </div>

    <div class="status-box" id="action_box">
        <div class="light" id="status_light"></div>
        <div>
            <h2 style="margin: 0 0 5px 0;" id="action_title">计算中...</h2>
            <p style="margin: 0; color: #aaa;" id="action_desc">请调整参数</p>
        </div>
    </div>

    <div class="table-container" style="margin-top: 20px;">
        <table>
            <thead>
                <tr>
                    <th>国际油价假设</th>
                    <th>预估利润 (亿元)</th>
                    <th>每股分红 (HK$)</th>
                    <th>安全股价 (HK$)</th>
                    <th>当前市价股息率</th>
                </tr>
            </thead>
            <tbody id="table_body">
                </tbody>
        </table>
    </div>

</div>

<script>
    // 核心财务参数假设 (基于前三季度推导)
    const EXCHANGE_RATE = 0.88; // 1港元 = 0.88人民币
    const PAYOUT_RATIO = 0.455; // 派息率 45.5%
    const TOTAL_SHARES = 476;   // 总股本约 476 亿股
    const BASE_PROFIT = 1360;   // 68美元油价、27.35成本下的年化利润基准 (亿元)
    const PROFIT_MULTIPLIER = 20; // 利润弹性: 净利差每变动1美元，全年利润变动约 20 亿元

    // 核心计算逻辑
    function getFinancials(oil, barrel) {
        // 净利差变化 = (当前油价 - 基准油价) - (当前成本 - 基准成本) * 1.05(税费放大系数)
        let effectiveMargin = (oil - 68) - (barrel - 27.35) * 1.05;
        let profit = BASE_PROFIT + (effectiveMargin * PROFIT_MULTIPLIER);
        if(profit < 0) profit = 0; // 利润见底
        
        let eps = profit / TOTAL_SHARES; // 每股收益(人民币)
        let div = (eps * PAYOUT_RATIO) / EXCHANGE_RATE; // 换算为港币分红
        return { profit: profit, div: div };
    }

    // 同步滑块和输入框
    function sync(sourceId, targetId) {
        document.getElementById(targetId).value = document.getElementById(sourceId).value;
        calculate();
    }

    // 主计算函数
    function calculate() {
        // 获取输入值
        let oil = parseFloat(document.getElementById('in_oil').value);
        let price = parseFloat(document.getElementById('in_price').value);
        let cost = parseFloat(document.getElementById('in_cost').value);
        let barrel = parseFloat(document.getElementById('in_barrel').value);
        let targetYield = parseFloat(document.getElementById('in_target').value) / 100;

        // 计算当前输入的财务数据
        let currentFin = getFinancials(oil, barrel);
        let safePrice = currentFin.div / targetYield;
        let currentYield = currentFin.div / price;
        let myYield = currentFin.div / cost;

        // 更新卡片UI
        document.getElementById('out_div').innerText = "HK$ " + currentFin.div.toFixed(2);
        document.getElementById('out_profit').innerText = "预估利润: " + Math.round(currentFin.profit) + " 亿元";
        document.getElementById('out_safe').innerText = "HK$ " + safePrice.toFixed(2);
        document.getElementById('out_current_yield').innerText = (currentYield * 100).toFixed(1) + "%";
        document.getElementById('out_my_yield').innerText = (myYield * 100).toFixed(1) + "%";

        // 更新红绿灯逻辑
        let light = document.getElementById('status_light');
        let title = document.getElementById('action_title');
        let desc = document.getElementById('action_desc');
        let cardSafe = document.getElementById('card_safe');

        if (price <= safePrice * 0.95) {
            light.style.backgroundColor = "var(--green)";
            light.style.color = "var(--green)";
            title.innerText = "🟢 绿灯区：安全垫极厚，放心买入";
            desc.innerText = `当前市价低于安全价，实际股息率高达 ${(currentYield*100).toFixed(1)}%，属于极佳击球区。`;
            cardSafe.style.borderTopColor = "var(--green)";
        } else if (price <= safePrice * 1.05) {
            light.style.backgroundColor = "var(--yellow)";
            light.style.color = "var(--yellow)";
            title.innerText = "🟡 黄灯区：观望或小额定投";
            desc.innerText = `当前价格刚好压在设定的目标股息率 ${targetYield*100}% 附近，不建议大额追高。`;
            cardSafe.style.borderTopColor = "var(--yellow)";
        } else {
            light.style.backgroundColor = "var(--red)";
            light.style.color = "var(--red)";
            title.innerText = "🔴 红灯区：严重透支，考虑止盈换仓";
            desc.innerText = `当前价格已透支基本面，股息率跌至 ${(currentYield*100).toFixed(1)}%。建议停止买入，可考虑卖出转投 SCHD。`;
            cardSafe.style.borderTopColor = "var(--red)";
        }

        // 更新表格 (50, 60, 当前油价, 80, 90)
        let tableOilPrices = [50, 60, oil, 80, 90];
        // 排序并去重
        tableOilPrices = [...new Set(tableOilPrices)].sort((a,b) => a-b);
        
        let tbody = document.getElementById('table_body');
        tbody.innerHTML = "";
        
        tableOilPrices.forEach(o => {
            let fin = getFinancials(o, barrel);
            let sPrice = fin.div / targetYield;
            let cYield = fin.div / price;
            
            let tr = document.createElement('tr');
            if (o === oil) tr.className = "current-row";
            
            tr.innerHTML = `
                <td>$${o.toFixed(2)}</td>
                <td>${Math.round(fin.profit)}</td>
                <td>${fin.div.toFixed(2)}</td>
                <td>${sPrice.toFixed(2)}</td>
                <td style="color: ${cYield >= targetYield ? 'var(--green)' : 'var(--red)'}">${(cYield*100).toFixed(1)}%</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 初始化计算
    window.onload = calculate;
</script>

</body>
</html>
